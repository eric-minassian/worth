name: Nightly

# Runs on every push to main. Builds macOS arm64 DMG and publishes a
# prerelease on GitHub. The renderer's "nightly" channel lists any release
# flagged as prerelease with a `-nightly.` version tag.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute nightly version
        id: version
        run: |
          v=$(node scripts/set-version.mjs --nightly)
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "Nightly version: ${v}"

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build renderer/main/preload
        run: pnpm --filter @worth/electron build

      - name: Package and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        # `--config.publish.releaseType=prerelease` marks the GitHub release as
        # prerelease, which is how the renderer separates nightly from stable.
        run: pnpm --filter @worth/electron exec electron-builder --publish always --config.publish.releaseType=prerelease
