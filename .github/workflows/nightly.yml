name: Nightly

# Runs on every push to main. Builds Worth and publishes a prerelease to
# GitHub Releases. Version string is `X.Y.Z-nightly.<YYYYMMDDHHmm>.<shortsha>`,
# which electron-builder routes to `nightly.yml` — clients on the "nightly"
# channel pick it up from there.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute nightly version
        id: version
        shell: bash
        run: |
          v=$(node scripts/set-version.mjs --nightly)
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "Nightly version: ${v}"

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (Linux)
        if: matrix.platform == 'linux'
        run: xvfb-run --auto-servernum pnpm test

      - name: Test (${{ matrix.platform }})
        if: matrix.platform != 'linux'
        run: pnpm test

      - name: Build renderer/main/preload
        run: pnpm --filter @worth/electron build

      - name: Package and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm --filter @worth/electron exec electron-builder --publish always --config.releaseType=prerelease
