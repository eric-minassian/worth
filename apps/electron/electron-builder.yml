appId: com.ericminassian.worth
productName: Worth
copyright: Copyright © Eric Minassian

directories:
  output: dist
  buildResources: build

# The electron-vite build emits to out/. Bundle that plus package metadata.
# better-sqlite3's native .node must be unpacked from asar so dlopen can find it.
files:
  - out/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/*.map"

asar: true
asarUnpack:
  - "**/better-sqlite3/**"
  - "**/bindings/**"
  - "**/file-uri-to-path/**"

# Ad-hoc signs the .app bundle after packaging. Without this the bundle is
# completely unsigned and macOS refuses to launch it with a "damaged" error
# once the DMG download has flagged it with `com.apple.quarantine`.
afterPack: ./scripts/afterPack.mjs

mac:
  category: public.app-category.finance
  target:
    - target: dmg
      arch:
        - arm64
  # No Apple Developer ID — ad-hoc signing happens in the afterPack hook.
  # Leaving `identity` unset lets electron-builder skip its own (optional)
  # Developer ID lookup while the afterPack hook guarantees we end up with
  # at least a `-` (ad-hoc) signature.
  identity: null
  gatekeeperAssess: false

# Each build sets package.json version:
#   stable tag → "X.Y.Z"                        → GitHub release (full)
#   nightly    → "X.Y.Z-nightly.<ts>.<sha>"    → GitHub prerelease
# The renderer compares versions directly via the GitHub Releases API, so the
# release's prerelease flag is what partitions stable vs nightly channels.
publish:
  provider: github
  owner: eric-minassian
  repo: worth
